
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1757 Member Directory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --navy-mid: #162236;
    --navy-light: #1e3050;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f4efe6;
    --text: #e8e0d4;
    --text-muted: #8a9ab0;
    --border: rgba(201,168,76,0.2);
    --card-bg: rgba(255,255,255,0.04);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy) 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold-light);
    letter-spacing: 0.02em;
  }
  .header-left p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--navy);
  }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--gold); }
  .btn-icon {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 9px 10px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.2s;
  }
  .btn-icon:hover { color: var(--gold); border-color: var(--gold); }

  /* ── SEARCH & FILTER BAR ── */
  .controls {
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--navy-mid);
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 9px 12px 9px 36px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--gold); }

  .stats-bar {
    padding: 10px 24px;
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .stats-bar span { color: var(--gold); font-weight: 600; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    padding: 20px 24px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .card:hover {
    border-color: rgba(201,168,76,0.5);
    background: rgba(255,255,255,0.07);
    transform: translateY(-1px);
  }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--gold-light);
    margin-bottom: 4px;
  }
  .card-email {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
    word-break: break-all;
  }
  .card-notes {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    opacity: 0.85;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .card-date {
    font-size: 11px;
    color: var(--text-muted);
  }
  .card-actions { display: flex; gap: 8px; }
  .card-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .card-btn:hover { color: var(--gold); border-color: var(--gold); }
  .card-btn.danger:hover { color: #e05252; border-color: #e05252; }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty h3 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 8px; }

  /* ── MODALS ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold-light);
    margin-bottom: 20px;
  }
  .form-row { margin-bottom: 16px; }
  .form-row label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .form-row input,
  .form-row textarea,
  .form-row select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-row input:focus,
  .form-row textarea:focus { border-color: var(--gold); }
  .form-row textarea { resize: vertical; min-height: 90px; }
  .form-row select option { background: var(--navy-mid); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .sync-status {
    font-size: 12px;
    color: var(--text-muted);
    padding: 8px 24px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .sync-status.ok { color: #5cb85c; }
  .sync-status.err { color: #e05252; }
  .sync-status.loading { color: var(--gold); }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .controls, .stats-bar, .grid { padding-left: 16px; padding-right: 16px; }
    .header-left h1 { font-size: 18px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>1757 Member Directory</h1>
    <p>1757 Golf Club · Dulles, VA</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openAdd()">+ Add Member</button>
    <button class="btn-icon" onclick="openSettings()" title="Settings">⚙️</button>
  </div>
</header>

<div class="sync-status" id="syncStatus">Loading...</div>

<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search names, notes, email…" oninput="renderCards()">
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="grid" id="grid"></div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2 id="modalTitle">Add Member</h2>
    <div class="form-row">
      <label>Name *</label>
      <input id="f-name" type="text" placeholder="First Last">
    </div>
    <div class="form-row">
      <label>Email</label>
      <input id="f-email" type="email" placeholder="email@example.com">
    </div>
    <div class="form-row">
      <label>Phone</label>
      <input id="f-phone" type="tel" placeholder="(703) 555-1234">
    </div>
    <div class="form-row">
      <label>Occupation / Employer</label>
      <input id="f-job" type="text" placeholder="e.g. Retired CPA, Works at Lockheed">
    </div>
    <div class="form-row">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Physical description, connections, background, how you met…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveMember()">Save Member</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>⚙️ Settings</h2>
    <div class="form-row">
      <label>GitHub Token</label>
      <input id="s-token" type="password" placeholder="ghp_...">
    </div>
    <div class="form-row">
      <label>GitHub Repo</label>
      <input id="s-repo" type="text" placeholder="burnshomes247/bh-tools">
    </div>
    <div class="form-row">
      <label>Data File Path</label>
      <input id="s-path" type="text" placeholder="1757members/members.json">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('settingsModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save & Sync</button>
    </div>
  </div>
</div>

<script>
let members = [];
let editId = null;

// ── SETTINGS ──
function getSettings() {
  try { return JSON.parse(localStorage.getItem('1757settings') || '{}'); } catch { return {}; }
}
function saveSettingsToStorage(s) {
  localStorage.setItem('1757settings', JSON.stringify(s));
}

// ── GITHUB SYNC ──
async function loadFromGitHub() {
  const s = getSettings();
  if (!s.token || !s.repo || !s.path) {
    setSyncStatus('No GitHub settings — tap ⚙️ to configure', 'err');
    renderCards();
    return;
  }
  setSyncStatus('Syncing…', 'loading');
  try {
    const r = await fetch(`https://api.github.com/repos/${s.repo}/contents/${s.path}`, {
      headers: { Authorization: `Bearer ${s.token}`, Accept: 'application/vnd.github+json' }
    });
    if (r.status === 404) { members = []; setSyncStatus('Ready — no data yet', 'ok'); renderCards(); return; }
    if (!r.ok) throw new Error('GitHub fetch failed');
    const json = await r.json();
    members = JSON.parse(atob(json.content.replace(/\n/g, '')));
    setSyncStatus(`Synced · ${members.length} member${members.length !== 1 ? 's' : ''}`, 'ok');
  } catch (e) {
    setSyncStatus('Sync error: ' + e.message, 'err');
  }
  renderCards();
}

async function saveToGitHub() {
  const s = getSettings();
  if (!s.token || !s.repo || !s.path) return;
  setSyncStatus('Saving…', 'loading');
  try {
    let sha;
    const get = await fetch(`https://api.github.com/repos/${s.repo}/contents/${s.path}`, {
      headers: { Authorization: `Bearer ${s.token}`, Accept: 'application/vnd.github+json' }
    });
    if (get.ok) { const j = await get.json(); sha = j.sha; }
    const body = { message: 'Update 1757 member directory', content: btoa(unescape(encodeURIComponent(JSON.stringify(members, null, 2)))), ...(sha ? { sha } : {}) };
    const put = await fetch(`https://api.github.com/repos/${s.repo}/contents/${s.path}`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${s.token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!put.ok) throw new Error('Save failed');
    setSyncStatus(`Saved · ${members.length} member${members.length !== 1 ? 's' : ''}`, 'ok');
  } catch (e) {
    setSyncStatus('Save error: ' + e.message, 'err');
  }
}

function setSyncStatus(msg, type) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = 'sync-status ' + (type || '');
}

// ── RENDER ──
function renderCards() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q
    ? members.filter(m =>
        [m.name, m.email, m.phone, m.job, m.notes].some(v => v && v.toLowerCase().includes(q))
      )
    : members;

  document.getElementById('statsBar').innerHTML =
    `<span>${members.length}</span> total members &nbsp;·&nbsp; showing <span>${filtered.length}</span>`;

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><h3>${q ? 'No results' : 'No members yet'}</h3><p>${q ? 'Try a different search term.' : 'Tap "Add Member" to get started.'}</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(m => {
    const date = m.added ? new Date(m.added).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const lines = [
      m.email && `<div class="card-email">${m.email}${m.phone ? ' · ' + m.phone : ''}</div>`,
      m.job && `<div style="font-size:12px;color:var(--gold);opacity:0.8;margin-bottom:8px">${m.job}</div>`,
      m.notes && `<div class="card-notes">${m.notes}</div>`
    ].filter(Boolean).join('');
    return `
      <div class="card">
        <div class="card-name">${m.name}</div>
        ${lines}
        <div class="card-footer">
          <div class="card-date">${date}</div>
          <div class="card-actions">
            <button class="card-btn" onclick="openEdit('${m.id}');event.stopPropagation()">Edit</button>
            <button class="card-btn danger" onclick="deleteMember('${m.id}');event.stopPropagation()">Delete</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── CRUD ──
function openAdd() {
  editId = null;
  document.getElementById('modalTitle').textContent = 'Add Member';
  ['name','email','phone','job','notes'].forEach(id => document.getElementById('f-' + id).value = '');
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 100);
}

function openEdit(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'Edit Member';
  document.getElementById('f-name').value = m.name || '';
  document.getElementById('f-email').value = m.email || '';
  document.getElementById('f-phone').value = m.phone || '';
  document.getElementById('f-job').value = m.job || '';
  document.getElementById('f-notes').value = m.notes || '';
  document.getElementById('addModal').classList.add('open');
}

async function saveMember() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const now = Date.now();
  const data = {
    name,
    email: document.getElementById('f-email').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    job: document.getElementById('f-job').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
  };
  if (editId) {
    const idx = members.findIndex(m => m.id === editId);
    if (idx > -1) members[idx] = { ...members[idx], ...data, updated: now };
  } else {
    members.unshift({ id: 'm' + now, ...data, added: now });
  }
  closeModal('addModal');
  renderCards();
  await saveToGitHub();
}

async function deleteMember(id) {
  const m = members.find(x => x.id === id);
  if (!confirm(`Remove ${m?.name || 'this member'}?`)) return;
  members = members.filter(x => x.id !== id);
  renderCards();
  await saveToGitHub();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── SETTINGS ──
function openSettings() {
  const s = getSettings();
  document.getElementById('s-token').value = s.token || '';
  document.getElementById('s-repo').value = s.repo || 'burnshomes247/bh-tools';
  document.getElementById('s-path').value = s.path || '1757members/members.json';
  document.getElementById('settingsModal').classList.add('open');
}
function saveSettings() {
  saveSettingsToStorage({
    token: document.getElementById('s-token').value.trim(),
    repo: document.getElementById('s-repo').value.trim(),
    path: document.getElementById('s-path').value.trim(),
  });
  closeModal('settingsModal');
  loadFromGitHub();
}

// close on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

loadFromGitHub();
</script>
</body>
</html>
